name: Release

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run tests
        shell: pwsh
        run: python -m unittest discover -s tests -v

      - name: Build plugin
        shell: pwsh
        run: .\tools\build.ps1 -Platform x64 -Configuration Release -SkipSign

      - name: Run C++ smoke
        shell: pwsh
        run: |
          cmake -S . -B build\cmake-x64 -A x64
          cmake --build build\cmake-x64 --config Release --target CodexUsageJsonParserSmoke
          ctest --test-dir build\cmake-x64 -C Release --output-on-failure

      - name: Package plugin
        shell: pwsh
        run: |
          $packageRoot = "dist\CodexUsage"
          New-Item -ItemType Directory -Force -Path $packageRoot | Out-Null
          Copy-Item -LiteralPath "build\x64\Release\CodexUsage.dll" -Destination $packageRoot -Force
          Copy-Item -LiteralPath "build\x64\Release\scripts" -Destination $packageRoot -Recurse -Force
          Compress-Archive -Path "$packageRoot\*" -DestinationPath "dist\CodexUsage-TrafficMonitor-x64.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexUsage-TrafficMonitor-x64
          path: dist/CodexUsage-TrafficMonitor-x64.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/CodexUsage-TrafficMonitor-x64.zip
